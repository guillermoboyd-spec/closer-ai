<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global Boyd | Closer AI Elite</title>
    <link rel="stylesheet" href="app.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header class="main-header">
            <div class="lang-row">
                <span onclick="toggleL('en')">ENGLISH</span>
                <span style="opacity:0.2; color:#555">|</span>
                <span onclick="toggleL('es')">ESPAÑOL</span>
            </div>
            <!-- Global Boyd Gold Tiger Logo -->
            <img src="logo_gold.png" class="brand-logo">
            <h1>GLOBAL BOYD | CLOSER AI</h1>
            <div id="usage-status" style="font-size:0.6rem; color:#666; font-weight:900; border:1px solid #222; padding:4px 15px; border-radius:30px">EXECUTIVE STATUS: 100% ACCESS</div>
        </header>

        <main id="tab-content">
            <!-- Intelligent Business Feed -->
        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-tab="sales">
                <i class="fa-solid fa-file-invoice-dollar"></i>
                <span>Sales</span>
            </button>
            <button class="nav-item" data-tab="inventory">
                <i class="fa-solid fa-server"></i>
                <span>Database</span>
            </button>
            <button class="nav-item" data-tab="account">
                <i class="fa-solid fa-shield-halved"></i>
                <span>Account</span>
            </button>
        </nav>
    </div>

    <!-- Executive Paywall -->
    <div id="paywall-modal" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9000; display:flex; justify-content:center; align-items:center; padding:30px">
        <div class="elite-card" style="text-align:center; width:100%">
            <div style="font-size:3rem; color:var(--primary); margin-bottom:30px"><i class="fa-solid fa-gem"></i></div>
            <h2 style="font-size:1.8rem; font-weight:900; margin-bottom:20px; text-transform:uppercase">Master Access Required</h2>
            <p style="color:#666; margin-bottom:35px; line-height:1.6">You have reached the credit limit. Unlock universal access to continue closing deals.</p>
            <button class="btn-gold" onclick="simulatePay()">Initialize Master Access</button>
            <button onclick="closePaywall()" style="background:none; border:none; color:#444; margin-top:20px; font-weight:800; cursor:pointer">Collapse</button>
        </div>
    </div>

    <div id="toast" class="hidden" style="position:fixed; bottom:120px; left:50%; transform:translateX(-50%); background:var(--primary); color:#000; padding:15px 35px; border-radius:10px; font-weight:900; text-transform:uppercase; font-size:0.75rem; letter-spacing:1.5px; z-index:9000; box-shadow:0 10px 40px rgba(0,0,0,0.5)"></div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(() => console.log('Global Boyd: Closer AI Offline Engine Active ✅'))
                .catch(err => console.log('Offline Engine Error:', err));
        }
    </script>
</body>
</html>
